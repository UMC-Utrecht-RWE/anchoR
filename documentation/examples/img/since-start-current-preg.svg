<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 218" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <style>
    .surface { fill: #fcfcfb; stroke: #e1e0d9; }
    .title { font-size: 16px; font-weight: 700; fill: #0b0b0b; }
    .formula { font-size: 12.5px; fill: #52514e; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    .ep { fill: rgba(42,120,214,0.14); stroke: #2a78d6; stroke-width: 1.5; }
    .ep-dim { fill: rgba(42,120,214,0.07); stroke: #2a78d6; stroke-opacity: 0.4; stroke-width: 1.5; }
    .ep-name { font-size: 11.5px; font-weight: 700; fill: #0b0b0b; text-anchor: middle; }
    .ep-name-dim { font-size: 11.5px; font-weight: 700; fill: #898781; text-anchor: middle; }
    .ep-date { font-size: 9.5px; fill: #52514e; text-anchor: middle; }
    .ep-date-dim { font-size: 9.5px; fill: #898781; text-anchor: middle; }
    .win { fill: rgba(27,175,122,0.20); stroke: #1baf7a; stroke-width: 1.5; }
    .win-label { font-size: 11px; font-weight: 700; fill: #128a5e; text-anchor: middle; }
    .win-date { font-size: 10.5px; fill: #52514e; text-anchor: middle; }
    .baseline { stroke: #c3c2b7; stroke-width: 1.5; }
    .anchor-line { stroke: #898781; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .anchor-label { font-size: 11px; font-weight: 700; fill: #52514e; text-anchor: middle; }
  </style>

  <rect class="surface" x="1" y="1" width="898" height="216" rx="12"/>

  <text class="title" x="20" y="26">SINCE_START_CURRENT_PREG</text>
  <text class="formula" x="20" y="44">start_offset=0, end_offset=0 &#8594; window = [episode_start, anchor]</text>

  <text class="anchor-label" x="590" y="60" text-anchor="middle">T0 = 2026-02-15</text>
  <line class="anchor-line" x1="590" y1="52" x2="590" y2="176"/>

  <rect class="ep-dim" x="70" y="72" width="120" height="34" rx="6"/>
  <text class="ep-name-dim" x="130" y="87">A (not used here)</text>
  <text class="ep-date-dim" x="130" y="100">2023-01-01 &#8594; 2023-09-01</text>

  <rect class="ep-dim" x="250" y="72" width="120" height="34" rx="6"/>
  <text class="ep-name-dim" x="310" y="87">B (not used here)</text>
  <text class="ep-date-dim" x="310" y="100">2024-03-01 &#8594; 2024-11-15</text>

  <rect class="ep" x="470" y="72" width="270" height="34" rx="6"/>
  <text class="ep-name" x="605" y="87">C (current, contains T0)</text>
  <text class="ep-date" x="605" y="100">2025-11-01 &#8594; 2026-08-01</text>

  <line class="baseline" x1="30" y1="126" x2="860" y2="126"/>
  <polygon points="860,126 852,121.5 852,130.5" fill="#c3c2b7"/>

  <!-- window: 2025-11-01 (episode C start, x=470) -> 2026-02-15 (anchor, x=590) -->
  <rect class="win" x="470" y="142" width="120" height="26" rx="5"/>
  <text class="win-label" x="530" y="159">window</text>
  <text class="win-date" x="530" y="186">2025-11-01 &#8594; 2026-02-15 (stops exactly at T0)</text>
</svg>
